# sacred.dylanmccapes.systems — Sacred Concepts Atlas query portal.
#
# Install via:  sudo bash deploy/deploy.sh
#
# Topology:
#   browser → Cloudflare (Full strict) → nginx :443
#     /          → /var/www/sacred/index.html
#     /api/*     → 127.0.0.1:8877  (systemd user unit: sacred-portal)
#
# TLS = Cloudflare Origin CA (covers *.dylanmccapes.systems). DNS A for
# `sacred` must be Proxied.

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name sacred.dylanmccapes.systems;

    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;

    root /var/www/sacred;
    index index.html;

    # Query pipeline routinely takes 1–3 minutes (probe→gap→report→evidence).
    location /api/ {
        proxy_pass http://127.0.0.1:8877;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        # Don't buffer a long-running JSON response; let the browser wait.
        proxy_buffering off;
    }

    location / {
        add_header Cache-Control "public, max-age=60";
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name sacred.dylanmccapes.systems;
    return 301 https://$host$request_uri;
}
